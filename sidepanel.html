<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XPath Helper</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <div class="input-section">
      <div class="input-group">
        <textarea 
          id="xpath-input" 
          placeholder="输入 XPath 表达式，Ctrl+Enter 查询"
          rows="2"
        ></textarea>
      </div>
      <div class="input-actions">
        <div class="examples-buttons">
          <button class="example-btn" data-xpath="//a">链接</button>
          <button class="example-btn" data-xpath="//img/@src">图片</button>
          <button class="example-btn" data-xpath="//h1 | //h2">标题</button>
          <button class="example-btn" data-xpath="//*[@id]">ID</button>
        </div>
        <button id="search-btn" class="btn btn-primary">查询</button>
      </div>
    </div>

    <div class="history-section" id="history-section" style="display: none;">
      <div class="history-header">
        <span>历史</span>
        <button class="clear-history-btn" id="clear-history-btn" title="清空历史">🗑️</button>
      </div>
      <div class="history-list" id="history-list"></div>
    </div>

    <div class="results-section">
      <div class="results-header">
        <span id="result-count" class="result-count">结果：0</span>
        <div class="header-actions">
          <button id="clear-btn" class="btn btn-clear" title="清除结果">清除</button>
          <button id="copy-all-btn" class="btn btn-secondary" disabled>复制全部</button>
        </div>
      </div>
      
      <div id="results-container" class="results-container">
        <div class="empty-state">
          <p>输入 XPath 表达式开始查询</p>
        </div>
      </div>
    </div>
  </div>
  
  <script src="sidepanel.js"></script>
</body>
</html>
